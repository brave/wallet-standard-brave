name: Pull Request
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
jobs:
  audit:
    name: Audit packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
      - name: Audit packages
        run: npm audit --audit-level moderate
