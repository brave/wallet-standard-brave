name: Pull Request
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
jobs:
  audit:
    name: Audit packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - name: Audit packages
        run: npm audit --audit-level moderate
