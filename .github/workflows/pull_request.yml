name: Pull Request
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
jobs:
  audit:
    name: Audit packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      - name: Audit packages
        run: npm audit --audit-level moderate
